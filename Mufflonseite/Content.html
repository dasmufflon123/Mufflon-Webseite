<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content — Das__Mufflon</title>
  <link rel="icon" type="image/png" href="assets/mufflon-mascot.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ============================================================
       CONTENT — Anpassungen für Stream + Shorts
       ============================================================ */

    /* Weniger Platz oben */
    .content-header {
      padding-top: 10px !important;
      padding-bottom: 10px !important;
    }
    .content-header .section-head {
      margin-bottom: 16px !important;
    }
    .content-header .section-head h1 {
      font-size: clamp(1.6rem, 2.5vw, 2.2rem) !important;
    }
    .content-header .section-head .eyebrow {
      font-size: 0.95rem !important;
    }

    /* Stream + Shorts nebeneinander */
    .stream-layout {
      display: flex;
      gap: 24px;
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 24px 30px;
      align-items: flex-start;
    }

    .stream-main {
      flex: 1;
      min-width: 0;
    }

    .stream-main .embed-wrap {
      aspect-ratio: 16 / 9;
      max-width: 100%;
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-lift);
      background: #1c1210;
    }
    .stream-main .embed-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Shorts-Sidebar (rechts) */
    .shorts-sidebar {
      flex: 0 0 200px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .shorts-sidebar .short-item {
      aspect-ratio: 9 / 16;
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      background: #1c1210;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .shorts-sidebar .short-item:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: var(--shadow-lift);
    }
    .shorts-sidebar .short-item iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Social-Buttons (kompakt) */
    .content-social-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      max-width: 720px;
      margin: 0 auto 14px;
    }
    .content-social-row a {
      display: block;
      width: 140px;
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .content-social-row a:hover { transform: translateY(-3px); }
    .content-social-row img {
      width: 100%;
      display: block;
      filter: drop-shadow(0 4px 10px rgba(62,44,30,0.18));
      border-radius: 12px;
    }

    /* Neuigkeiten-Bereich (kompakter) */
    .news-section {
      padding-top: 10px !important;
      padding-bottom: 30px !important;
    }
    .news-section .section-head {
      margin-bottom: 16px !important;
    }
    .news-section .section-head h2 {
      font-size: clamp(1.3rem, 2vw, 1.8rem) !important;
    }

    /* Responsive */
    @media (max-width: 780px) {
      .stream-layout {
        flex-direction: column;
      }
      .shorts-sidebar {
        flex: 1;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
      }
      .shorts-sidebar .short-item {
        flex: 0 0 140px;
        aspect-ratio: 9 / 16;
      }
      .content-social-row a {
        width: 110px;
      }
    }

    @media (max-width: 480px) {
      .shorts-sidebar .short-item {
        flex: 0 0 100px;
      }
      .content-social-row a {
        width: 80px;
      }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       JAVASCRIPT
       ============================================================ -->
  <script src="js/content-data.js"></script>
  <script src="js/main.js"></script>
  <script>
    const container = document.getElementById('news-container');

    if (!CONTENT_EINTRAEGE || CONTENT_EINTRAEGE.length === 0) {
      container.innerHTML = '<div class="empty-state">Noch keine Neuigkeiten — schau bald wieder vorbei! 🌿</div>';
    } else {
      CONTENT_EINTRAEGE.forEach(entry => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <span class="tag">${entry.tag || 'Neu'}</span>
          <h3 style="margin-top:4px;">${entry.titel}</h3>
          <p style="color:#8a7660; font-size:0.85rem; margin-bottom:10px;">${entry.datum}</p>
          <p style="margin-bottom:0;">${entry.text}</p>
        `;
        container.appendChild(card);
      });
    }
  </script>
