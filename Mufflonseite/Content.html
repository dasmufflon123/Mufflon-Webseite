  <style>
    /* ============================================================
       CONTENT — Stream + Shorts + Instagram
       ============================================================ */

    /* Header kleiner */
    .content-header {
      padding-top: 10px !important;
      padding-bottom: 10px !important;
    }
    .content-header .section-head {
      margin-bottom: 16px !important;
    }
    .content-header .section-head h1 {
      font-size: clamp(1.6rem, 2.5vw, 2.2rem) !important;
    }
    .content-header .section-head .eyebrow {
      font-size: 0.95rem !important;
    }

    /* Haupt-Layout: Stream links, Shorts + Instagram rechts */
    .content-grid {
      display: flex;
      gap: 24px;
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 24px 20px;
      align-items: flex-start;
    }

    /* Linke Spalte: Stream (20% kleiner, weiter links) */
    .stream-col {
      flex: 0 0 48%;
      min-width: 0;
    }
    .stream-col .embed-wrap {
      aspect-ratio: 16 / 9;
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-lift);
      background: #1c1210;
    }
    .stream-col .embed-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Rechte Spalte: Shorts + Instagram (50% größer) */
    .side-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* YouTube-Shorts: 3 nebeneinander, 50% größer */
    .shorts-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .shorts-row .short-item {
      aspect-ratio: 9 / 16;
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      background: #1c1210;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      transform: scale(1.5);
      transform-origin: top left;
      width: 66.66%;
    }
    .shorts-row .short-item:hover {
      transform: scale(1.55);
      box-shadow: var(--shadow-lift);
    }
    .shorts-row .short-item iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Instagram-Reihe: 3 nebeneinander, 50% größer */
    .insta-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 8px;
    }
    .insta-row .insta-item {
      aspect-ratio: 1 / 1;
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      background: #1c1210;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      transform: scale(1.5);
      transform-origin: top left;
      width: 66.66%;
    }
    .insta-row .insta-item:hover {
      transform: scale(1.55);
      box-shadow: var(--shadow-lift);
    }
    .insta-row .insta-item iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Social-Buttons (kompakt) */
    .content-social-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      max-width: 720px;
      margin: 0 auto 14px;
    }
    .content-social-row a {
      display: block;
      width: 140px;
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .content-social-row a:hover { transform: translateY(-3px); }
    .content-social-row img {
      width: 100%;
      display: block;
      filter: drop-shadow(0 4px 10px rgba(62,44,30,0.18));
      border-radius: 12px;
    }

    /* ---- Responsive ---- */
    @media (max-width: 820px) {
      .content-grid {
        flex-direction: column;
      }
      .stream-col {
        flex: 1;
        width: 100%;
      }
      .side-col {
        width: 100%;
      }
      .shorts-row .short-item,
      .insta-row .insta-item {
        transform: scale(1);
        width: 100%;
        transform-origin: center;
      }
      .shorts-row .short-item:hover,
      .insta-row .insta-item:hover {
        transform: scale(1.02);
      }
    }

    @media (max-width: 600px) {
      .shorts-row {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .insta-row {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .content-social-row a {
        width: 100px;
      }
      .shorts-row .short-item,
      .insta-row .insta-item {
        transform: scale(1);
        width: 100%;
      }
    }
  </style>
</head>
