<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News — Das__Mufflon</title>
  <link rel="icon" type="image/png" href="assets/mufflon-mascot.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="nav-inner">
      <a href="index.html" class="brand">
        <img src="assets/mufflon-mascot.png" alt="Mufflon Maskottchen">
        Das__Mufflon
      </a>
      <button class="nav-toggle" aria-label="Menü öffnen">☰</button>
      <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="news.html" class="active">News</a>
        <a href="pflanze.html">Opfanze</a>
        <a href="archiv.html">Archiv</a>
        <a href="pomodoro.html">Pomodoro</a>
        <a href="mahmories.html">Mähmories</a>
      </nav>
    </div>
  </header>

  <section style="padding-top:50px;">
    <div class="section-head">
      <span class="eyebrow">Frisch aus dem Stall</span>
      <h1>News</h1>
      <p>Alles Neue rund um Stream, Community und Projekte.</p>
    </div>

    <div id="news-liste" class="wrap" style="display:flex; flex-direction:column; gap:18px; max-width:720px;">
      <!-- wird per JavaScript aus news-data.js befüllt -->
    </div>
  </section>

  <footer class="site-footer">
    <div class="footer-brand">Das__Mufflon 🐑</div>
    <p><a href="https://twitch.tv/das__mufflon" target="_blank" rel="noopener">twitch.tv/das__mufflon</a></p>
  </footer>

  <script src="js/news-data.js"></script>
  <script src="js/main.js"></script>
  <script>
    const monate = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
    function formatDatum(iso) {
      const [j, m, t] = iso.split("-").map(Number);
      return `${t}. ${monate[m - 1]} ${j}`;
    }

    const liste = document.getElementById('news-liste');

    if (!NEWS_EINTRAEGE || NEWS_EINTRAEGE.length === 0) {
      liste.innerHTML = '<div class="empty-state">Hier ist gerade noch Wachstumspause — bald gibt es News! 🌱</div>';
    } else {
      NEWS_EINTRAEGE.forEach(eintrag => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <span class="tag">${eintrag.tag}</span>
          <h3>${eintrag.titel}</h3>
          <p style="color:#8a7660; font-size:0.9rem; margin-bottom:8px;">${formatDatum(eintrag.datum)}</p>
          <p>${eintrag.text}</p>
        `;
        liste.appendChild(card);
      });
    }
  </script>
</body>
</html>
