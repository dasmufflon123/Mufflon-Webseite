<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opfanze — Das__Mufflon</title>
  <link rel="icon" type="image/png" href="assets/mufflon-mascot.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ============================================================
       OPFANZE KIOSK — Eigene Styles
       ============================================================ */

    .kiosk-hero {
      padding: 40px 24px 30px;
      max-width: 1080px;
      margin: 0 auto;
    }

    .kiosk-hero .section-head {
      margin-bottom: 30px;
    }

    /* ---- Hervorgehobene Ausgabe ---- */
    .featured-card {
      background: var(--cream-soft);
      border: 3px solid var(--terracotta);
      border-radius: var(--radius-lg);
      padding: 30px 35px;
      box-shadow: var(--shadow-lift);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 30px;
      transition: transform 0.2s ease;
      position: relative;
      overflow: hidden;
      margin-bottom: 40px;
    }
    .featured-card::before {
      content: "";
      position: absolute;
      top: -50%;
      right: -20%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(221,138,70,0.08), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .featured-card:hover {
      transform: translateY(-3px);
    }

    .featured-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--terracotta);
      color: var(--white);
      font-family: 'Baloo 2', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 5px 16px;
      border-radius: 999px;
      letter-spacing: 0.04em;
      box-shadow: 0 2px 8px rgba(221,138,70,0.3);
    }

    .featured-info {
      flex: 1;
      min-width: 200px;
      z-index: 1;
    }
    .featured-info .typ-badge {
      display: inline-block;
      font-family: 'Baloo 2', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 999px;
      background: var(--moss);
      color: var(--white);
      margin-bottom: 8px;
    }
    .featured-info .typ-badge.event { background: var(--twilight); }
    .featured-info h2 {
      font-size: clamp(1.5rem, 2.5vw, 2.2rem);
      margin: 0 0 4px;
    }
    .featured-info .meta {
      color: var(--text-soft);
      font-size: 0.9rem;
      margin-bottom: 14px;
    }
    .featured-info .btn {
      font-size: 1.05rem;
      padding: 12px 28px;
    }
    .featured-info .btn svg {
      width: 18px;
      height: 18px;
      margin-right: 6px;
    }

    .featured-number {
      font-family: 'Baloo 2', sans-serif;
      font-size: 4rem;
      font-weight: 800;
      color: var(--terracotta);
      line-height: 1;
      opacity: 0.15;
      position: absolute;
      bottom: 10px;
      right: 30px;
      pointer-events: none;
      user-select: none;
    }
    @media (max-width: 600px) {
      .featured-number { font-size: 2.5rem; bottom: 6px; right: 16px; }
      .featured-card { padding: 24px 20px; }
      .featured-badge { top: 10px; right: 10px; font-size: 0.7rem; padding: 4px 12px; }
    }

    /* ---- Such- und Filterleiste ---- */
    .kiosk-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px 20px;
      max-width: 1080px;
      margin: 0 auto 30px;
      padding: 0 24px;
    }
    .kiosk-toolbar .search-wrap {
      flex: 1;
      min-width: 180px;
      position: relative;
    }
    .kiosk-toolbar .search-wrap input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border-radius: 999px;
      border: 2px solid rgba(107,66,38,0.15);
      background: var(--cream-soft);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      outline: none;
    }
    .kiosk-toolbar .search-wrap input:focus {
      border-color: var(--terracotta);
      box-shadow: 0 0 0 3px rgba(221,138,70,0.15);
    }
    .kiosk-toolbar .search-wrap .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-soft);
      opacity: 0.5;
      font-size: 1.1rem;
      pointer-events: none;
    }

    .kiosk-toolbar .filter-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .kiosk-toolbar .filter-tabs button {
      border: none;
      background: transparent;
      font-family: 'Baloo 2', sans-serif;
      font-weight: 600;
      font-size: 0.92rem;
      padding: 6px 16px;
      border-radius: 999px;
      color: var(--text-soft);
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
      border: 2px solid transparent;
    }
    .kiosk-toolbar .filter-tabs button:hover {
      background: rgba(107,66,38,0.06);
      color: var(--text);
    }
    .kiosk-toolbar .filter-tabs button.active {
      background: var(--terracotta);
      color: var(--white);
      border-color: var(--terracotta);
    }
    .kiosk-toolbar .filter-tabs button.active:hover {
      background: var(--terracotta-dark);
    }

    /* ---- Kachel-Raster ---- */
    .kiosk-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      max-width: 1080px;
      margin: 0 auto 40px;
      padding: 0 24px;
    }

    .kiosk-card {
      background: var(--cream-soft);
      border: 2px solid rgba(107,66,38,0.08);
      border-radius: var(--radius-md);
      padding: 18px 20px 20px;
      box-shadow: var(--shadow-soft);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .kiosk-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lift);
      border-color: var(--terracotta);
    }
    .kiosk-card .card-typ {
      font-family: 'Baloo 2', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 10px;
      border-radius: 999px;
      background: var(--moss);
      color: var(--white);
      display: inline-block;
      margin-bottom: 8px;
      align-self: flex-start;
    }
    .kiosk-card .card-typ.event { background: var(--twilight); }
    .kiosk-card .card-typ.inhaltsuebersicht { background: var(--terracotta-dark); }

    .kiosk-card .card-nummer {
      font-family: 'Baloo 2', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--horn-brown);
      line-height: 1.1;
      margin-bottom: 2px;
    }
    .kiosk-card .card-titel {
      font-family: 'Baloo 2', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.3;
      flex: 1;
    }
    .kiosk-card .card-datum {
      font-size: 0.78rem;
      color: var(--text-soft);
      margin-top: 6px;
    }

    /* ---- Inhaltsübersicht (speziell) ---- */
    .kiosk-card.inhaltskarte {
      background: linear-gradient(145deg, var(--cream-soft), #f0e4d0);
      border-style: dashed;
      border-color: var(--horn-brown);
      align-items: center;
      text-align: center;
      justify-content: center;
      min-height: 140px;
    }
    .kiosk-card.inhaltskarte .card-typ {
      background: var(--terracotta-dark);
    }
    .kiosk-card.inhaltskarte .card-titel {
      font-size: 1.05rem;
      margin: 4px 0 2px;
    }
    .kiosk-card.inhaltskarte .card-icon {
      font-size: 2rem;
      margin-bottom: 4px;
    }

    /* ---- Leerer Zustand ---- */
    .kiosk-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-soft);
      font-family: 'Patrick Hand', cursive;
      font-size: 1.2rem;
      grid-column: 1 / -1;
    }

    /* ---- Responsive ---- */
    @media (max-width: 640px) {
      .kiosk-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
      .kiosk-toolbar { flex-direction: column; align-items: stretch; }
      .kiosk-toolbar .filter-tabs { justify-content: center; }
      .featured-info .btn { width: 100%; justify-content: center; }
    }
    @media (max-width: 480px) {
      .kiosk-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

  <script src="js/Opfanze-data.js"></script>
  <script src="js/main.js"></script>
  <script>
    // ============================================================
    // OPFANZE KIOSK — JavaScript
    // ============================================================

    // ---- Datenbank mit Inhaltsübersicht erweitern ----
    const INHALTSPFAD = "assets/Opfanze_assets/Inhaltsuebersicht.pdf";

    // Prüfen, ob es eine Inhaltsübersicht gibt (hier manuell aktivieren)
    const HAT_INHALTSUEBERSICHT = true; // auf false setzen, wenn nicht vorhanden

    // Sortierung: neueste zuerst (nach Datum)
    function sortByDate(arr) {
      return [...arr].sort((a, b) => new Date(b.datum) - new Date(a.datum));
    }

    // Alle Ausgaben (inkl. Inhaltsübersicht als "virtuelle" Ausgabe)
    function getAllAusgaben() {
      let alle = [...OPFANZE_AUSGABEN];
      if (HAT_INHALTSUEBERSICHT) {
        alle.push({
          typ: "inhaltsuebersicht",
          nummer: "",
          titel: "Inhaltsübersicht",
          datum: "2025-12-31",
          pfad: INHALTSPFAD
        });
      }
      return sortByDate(alle);
    }

    // ---- DOM-Elemente ----
    const grid = document.getElementById('kioskGrid');
    const featuredContainer = document.getElementById('featuredContainer');
    const searchInput = document.getElementById('kioskSearch');
    const filterButtons = document.querySelectorAll('#filterTabs button');

    let currentFilter = 'alle';
    let currentSearch = '';

    // ---- Render-Funktion ----
    function render() {
      const alle = getAllAusgaben();
      
      // Filtern
      let gefiltert = alle.filter(ausgabe => {
        // Typ-Filter
        if (currentFilter === 'alle') return true;
        if (currentFilter === 'inhaltsuebersicht') {
          return ausgabe.typ === 'inhaltsuebersicht';
        }
        return ausgabe.typ === currentFilter;
      });

      // Suche
      if (currentSearch.trim()) {
        const query = currentSearch.toLowerCase().trim();
        gefiltert = gefiltert.filter(ausgabe => {
          const nummerMatch = ausgabe.nummer && ausgabe.nummer.includes(query);
          const titelMatch = ausgabe.titel && ausgabe.titel.toLowerCase().includes(query);
          const typMatch = ausgabe.typ && ausgabe.typ.toLowerCase().includes(query);
          return nummerMatch || titelMatch || typMatch;
        });
      }

      // Hervorgehobene Ausgabe: erste (neueste) aus der gefilterten Liste, aber nur wenn kein Filter auf "inhaltsuebersicht"
      let featured = null;
      let rest = [];
      if (currentFilter !== 'inhaltsuebersicht' && gefiltert.length > 0) {
        // Die erste ist die neueste (wegen Sortierung)
        featured = gefiltert[0];
        rest = gefiltert.slice(1);
      } else {
        rest = gefiltert;
      }

      // Featured rendern
      renderFeatured(featured);

      // Grid rendern
      renderGrid(rest);
    }

    // ---- Featured rendern ----
    function renderFeatured(ausgabe) {
      if (!ausgabe) {
        featuredContainer.innerHTML = `
          <div style="text-align:center; padding:20px; color:var(--text-soft);">
            <p style="font-family:'Patrick Hand',cursive; font-size:1.1rem;">Keine Ausgabe gefunden 🌿</p>
          </div>
        `;
        return;
      }

      const isInhalt = ausgabe.typ === 'inhaltsuebersicht';
      const typLabel = isInhalt ? '📋 Inhaltsübersicht' : ausgabe.typ;
      const typClass = isInhalt ? 'inhaltsuebersicht' : (ausgabe.typ === 'Eventblatt' ? 'event' : '');
      const datumFormatiert = ausgabe.datum ? formatiereDatum(ausgabe.datum) : '';

      featuredContainer.innerHTML = `
        <a href="${ausgabe.pfad}" target="_blank" rel="noopener" class="featured-card" style="text-decoration:none; color:inherit; display:flex;">
          <span class="featured-badge">⭐ Neueste Ausgabe</span>
          <div class="featured-info">
            <span class="typ-badge ${typClass}">${typLabel}</span>
            ${!isInhalt ? `<h2>Ausgabe ${ausgabe.nummer}</h2>` : `<h2>📋 Inhaltsübersicht</h2>`}
            <p style="font-size:1.1rem; font-weight:600; color:var(--text); margin:0 0 2px;">${ausgabe.titel}</p>
            <p class="meta">${datumFormatiert}</p>
            <span class="btn btn-primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              Jetzt lesen
            </span>
          </div>
          ${!isInhalt ? `<div class="featured-number">#${ausgabe.nummer}</div>` : ''}
        </a>
      `;
    }

    // ---- Grid rendern ----
    function renderGrid(ausgaben) {
      if (ausgaben.length === 0) {
        grid.innerHTML = `<div class="kiosk-empty">Keine Ausgaben gefunden 🌿</div>`;
        return;
      }

      let html = '';
      ausgaben.forEach(ausgabe => {
        const isInhalt = ausgabe.typ === 'inhaltsuebersicht';
        const typLabel = isInhalt ? 'Inhaltsübersicht' : ausgabe.typ;
        const typClass = isInhalt ? 'inhaltsuebersicht' : (ausgabe.typ === 'Eventblatt' ? 'event' : '');
        const datumFormatiert = ausgabe.datum ? formatiereDatum(ausgabe.datum) : '';

        if (isInhalt) {
          // Spezielle Karte für Inhaltsübersicht
          html += `
            <a href="${ausgabe.pfad}" target="_blank" rel="noopener" class="kiosk-card inhaltskarte">
              <span class="card-typ inhaltsuebersicht">📋</span>
              <div class="card-icon">📄</div>
              <div class="card-titel">Inhaltsübersicht</div>
              <div class="card-datum">${datumFormatiert}</div>
            </a>
          `;
        } else {
          html += `
            <a href="${ausgabe.pfad}" target="_blank" rel="noopener" class="kiosk-card">
              <span class="card-typ ${typClass}">${typLabel}</span>
              <div class="card-nummer">#${ausgabe.nummer}</div>
              <div class="card-titel">${ausgabe.titel}</div>
              <div class="card-datum">${datumFormatiert}</div>
            </a>
          `;
        }
      });

      grid.innerHTML = html;
    }

    // ---- Event-Listener ----
    searchInput.addEventListener('input', (e) => {
      currentSearch = e.target.value;
      render();
    });

    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    // ---- Initialer Render ----
    render();
  </script>
</body>
