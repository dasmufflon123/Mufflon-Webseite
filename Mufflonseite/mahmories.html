<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mähmories — Das__Mufflon</title>
  <meta name="description" content="Mähmories — das digitale Erinnerungsbuch der Das__Mufflon Community.">
  <link rel="icon" type="image/png" href="assets/mufflon-mascot.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/mahmories.css">
</head>
<body>

  <header class="site-header">
    <div class="nav-inner">
      <a href="index.html" class="brand">
        <img src="assets/mufflon-mascot.png" alt="Mufflon Maskottchen">
        Das__Mufflon
      </a>
      <button class="nav-toggle" aria-label="Menü öffnen">☰</button>
      <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="news.html">News</a>
        <a href="pflanze.html">Opfanze</a>
        <a href="archiv.html">Archiv</a>
        <a href="pomodoro.html">Pomodoro</a>
        <a href="mahmories.html" class="active">Mähmories</a>
      </nav>
    </div>
  </header>

  <section style="padding-top:50px; padding-bottom:0;">
    <div class="section-head">
      <span class="eyebrow">Unser Erinnerungsbuch</span>
      <h1>💌 Mähmories</h1>
      <p>Ein Buch voller Gesichter und Worte aus unserer Community. Blätter einfach durch!</p>
    </div>
  </section>

  <div class="book-stage">
    <div class="book" id="book">
      <div class="book-base" id="bookBase">
        <div class="page-half left">
          <img id="baseLeftImg" src="" alt="">
          <div class="member-name" id="baseLeftName"></div>
        </div>
        <div class="page-half right">
          <div class="entry-text" id="baseRightText"></div>
        </div>
      </div>

      <div class="book-spine"></div>

      <div class="flip-page" id="flipPage">
        <div class="flip-face front" id="flipFront">
          <div class="page-half left">
            <img id="frontLeftImg" src="" alt="">
            <div class="member-name" id="frontLeftName"></div>
          </div>
          <div class="page-half right">
            <div class="entry-text" id="frontRightText"></div>
          </div>
        </div>
        <div class="flip-face back" id="flipBack">
          <div class="page-half left">
            <img id="backLeftImg" src="" alt="">
            <div class="member-name" id="backLeftName"></div>
          </div>
          <div class="page-half right">
            <div class="entry-text" id="backRightText"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="book-controls">
      <button class="book-nav-btn" id="prevBtn" aria-label="Vorherige Seite">←</button>
      <div class="book-page-indicator" id="pageIndicator">1 / 10</div>
      <button class="book-nav-btn" id="nextBtn" aria-label="Nächste Seite">→</button>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-brand">Das__Mufflon 🐑</div>
    <p><a href="https://twitch.tv/das__mufflon" target="_blank" rel="noopener">twitch.tv/das__mufflon</a></p>
  </footer>

  <script src="js/mahmories-data.js"></script>
  <script src="js/main.js"></script>
  <script>
    let currentIndex = 0;
    let isAnimating = false;

    const flipPage = document.getElementById('flipPage');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const indicator = document.getElementById('pageIndicator');

    function fillHalf(prefix, member) {
      document.getElementById(prefix + 'LeftImg').src = member.foto;
      document.getElementById(prefix + 'LeftImg').alt = member.name;
      document.getElementById(prefix + 'LeftName').textContent = member.name;
      document.getElementById(prefix + 'RightText').textContent = member.eintrag;
    }

    function renderBase(index) {
      fillHalf('base', MAHMORIES_MITGLIEDER[index]);
      indicator.textContent = (index + 1) + ' / ' + MAHMORIES_MITGLIEDER.length;
      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === MAHMORIES_MITGLIEDER.length - 1;
    }

    function resetFlipPageInstant(transformValue) {
      flipPage.style.transition = 'none';
      flipPage.style.transform = transformValue;
      // erzwingt Reflow, damit der nächste Übergang wieder animiert wird
      void flipPage.offsetWidth;
      flipPage.style.transition = '';
    }

    function turn(direction) {
      if (isAnimating) return;
      const targetIndex = currentIndex + direction;
      if (targetIndex < 0 || targetIndex >= MAHMORIES_MITGLIEDER.length) return;
      isAnimating = true;

      const current = MAHMORIES_MITGLIEDER[currentIndex];
      const target = MAHMORIES_MITGLIEDER[targetIndex];

      if (direction === 1) {
        fillHalf('front', current);
        fillHalf('back', target);
        resetFlipPageInstant('rotateY(0deg)');
        requestAnimationFrame(() => {
          flipPage.style.transform = 'rotateY(-180deg)';
        });
      } else {
        fillHalf('front', target);
        fillHalf('back', current);
        resetFlipPageInstant('rotateY(-180deg)');
        requestAnimationFrame(() => {
          flipPage.style.transform = 'rotateY(0deg)';
        });
      }

      const onDone = () => {
        flipPage.removeEventListener('transitionend', onDone);
        currentIndex = targetIndex;
        renderBase(currentIndex);
        resetFlipPageInstant('rotateY(0deg)');
        isAnimating = false;
      };
      flipPage.addEventListener('transitionend', onDone);
    }

    prevBtn.addEventListener('click', () => turn(-1));
    nextBtn.addEventListener('click', () => turn(1));
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') turn(1);
      if (e.key === 'ArrowLeft') turn(-1);
    });

    renderBase(currentIndex);
  </script>
</body>
</html>
