<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Mähmories — das digitale Erinnerungsbuch der Das__Mufflon Commähnity.">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/mahmories.css">
</head>
<body>

    <div class="nav-inner">
      <a href="index.html" class="brand">
        <img src="assets/mufflon-icon.svg" alt="Mufflon Maskottchen">
        Das__Mufflon
      </a>
      <button class="nav-toggle" aria-label="Menü öffnen">☰</button>
      <nav class="main-nav">
        <a href="index.html" class="nav-home"><img src="assets/mufflon-icon.svg" alt="Stall" title="Stall"></a>
        <a href="news.html">Content</a>
        <a href="pflanze.html">Opfanze</a>
        <a href="archiv.html">Highlights</a>
        <a href="pomodoro.html">Pomodoro</a>
        <a href="mahmories.html" class="active">Mähmories</a>
      </nav>
    </div>
  </header>

  <div class="social-dock">
    <a href="https://twitch.tv/das__mufflon" target="_blank" rel="noopener" aria-label="Twitch" class="social-btn" style="animation-delay:0s">
      <span class="social-float" style="animation-duration:3.2s; animation-delay:0.6s">
        <img src="assets/social/twitch.png" alt="Twitch">
      </span>
    </a>
    <a href="#" target="_blank" rel="noopener" aria-label="Discord" class="social-btn" style="animation-delay:0.15s">
      <span class="social-float" style="animation-duration:3.6s; animation-delay:0.75s">
        <img src="assets/social/dc.png" alt="Discord">
      </span>
    </a>
    <a href="#" target="_blank" rel="noopener" aria-label="Instagram" class="social-btn" style="animation-delay:0.3s">
      <span class="social-float" style="animation-duration:4.0s; animation-delay:0.9s">
        <img src="assets/social/insta.png" alt="Instagram">
      </span>
    </a>
  </div>

  <section style="padding-top:22px; padding-bottom:0;">
    <div class="section-head">
      <span class="eyebrow">Unser Erinnerungsbuch</span>
      <h1 style="font-size: clamp(1.5rem, 3vw, 2rem);">💌 Mähmories</h1>
      <p>Ein Buch voller Gesichter und Worte aus unserer Commähnity. Blätter einfach durch!</p>
    </div>
  </section>

  <div class="book-stage">
    <div class="book" id="book">
      <div class="book-base" id="bookBase">
        <div class="page-half left">
          <img id="baseLeftImg" src="" alt="">
        </div>
        <div class="page-half right">
          <img id="baseRightImg" src="" alt="">
        </div>
      </div>

      <div class="book-spine"></div>

      <!-- Klappt beim Vorblaettern: rechte Seite -> legt sich auf die linke -->
      <div class="flip-half right" id="flipRight">
        <div class="flip-face front">
          <img id="flipRightFrontImg" src="" alt="">
        </div>
        <div class="flip-face back">
          <img id="flipRightBackImg" src="" alt="">
        </div>
      </div>

      <!-- Klappt beim Zurueckblaettern: linke Seite -> legt sich auf die rechte -->
      <div class="flip-half left" id="flipLeft">
        <div class="flip-face front">
          <img id="flipLeftFrontImg" src="" alt="">
        </div>
        <div class="flip-face back">
          <img id="flipLeftBackImg" src="" alt="">
        </div>
      </div>
    </div>

    <div class="book-controls">
      <button class="book-nav-btn" id="prevBtn" aria-label="Vorherige Seite">←</button>
      <div class="book-page-indicator" id="pageIndicator">1 / 10</div>
      <button class="book-nav-btn" id="nextBtn" aria-label="Nächste Seite">→</button>
      <div class="book-jump">
        <input type="number" id="pageJumpInput" min="1" placeholder="Seite …" aria-label="Zu Seite springen">
        <button id="pageJumpBtn" aria-label="Springen">Los</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-brand">Das__Mufflon 🐑</div>
    <p><a href="https://twitch.tv/das__mufflon" target="_blank" rel="noopener">twitch.tv/das__mufflon</a></p>
  </footer>

  <script src="js/mahmories-data.js"></script>
  <script src="js/main.js"></script>
  <script>
    let currentIndex = 0;
    let isAnimating = false;

    const baseLeftImg = document.getElementById('baseLeftImg');
    const baseRightImg = document.getElementById('baseRightImg');
    const flipRight = document.getElementById('flipRight');
    const flipLeft = document.getElementById('flipLeft');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const indicator = document.getElementById('pageIndicator');

    function setImg(id, member, side) {
      const el = document.getElementById(id);
      el.src = side === 'links' ? member.seite_links : member.seite_rechts;
      el.alt = member.name + ' — ' + side + ' Seite';
    }

    function renderBaseInstant(index) {
      const m = MAHMORIES_MITGLIEDER[index];
      baseLeftImg.src = m.seite_links;
      baseLeftImg.alt = m.name + ' — linke Seite';
      baseRightImg.src = m.seite_rechts;
      baseRightImg.alt = m.name + ' — rechte Seite';
      indicator.textContent = (index + 1) + ' / ' + MAHMORIES_MITGLIEDER.length;
      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === MAHMORIES_MITGLIEDER.length - 1;

      // Beide ruhenden Klappen liegen deckungsgleich auf der Basis —
      // sie muessen deshalb immer dasselbe Bild zeigen wie die Basis,
      // sonst gibt's beim Stillstand einen sichtbaren Bildsprung.
      setImg('flipRightFrontImg', m, 'rechts');
      setImg('flipLeftFrontImg', m, 'links');
    }

    function resetFlapInstant(flap, transformValue) {
      flap.style.transition = 'none';
      flap.style.transform = transformValue;
      void flap.offsetWidth; // Reflow erzwingen, damit der naechste Uebergang wieder animiert
      flap.style.transition = '';
    }

    function turn(direction) {
      if (isAnimating) return;
      const targetIndex = currentIndex + direction;
      if (targetIndex < 0 || targetIndex >= MAHMORIES_MITGLIEDER.length) return;
      isAnimating = true;

      const current = MAHMORIES_MITGLIEDER[currentIndex];
      const target = MAHMORIES_MITGLIEDER[targetIndex];

      if (direction === 1) {
        // Vorwaerts: rechte Seite klappt um und legt sich auf die linke.
        flipRight.style.zIndex = '10';
        flipLeft.style.zIndex = '4';

        setImg('flipRightFrontImg', current, 'rechts');   // deckt die Basis exakt zu (nahtlos)
        setImg('flipRightBackImg', target, 'links');       // landet sichtbar auf der linken Haelfte

        // Die rechte Basis-Seite wird sofort gewechselt — sie ist ja unter der
        // Klappe verdeckt und wird erst sichtbar, sobald die Klappe sich hebt
        // (genau wie bei einem echten Buch: die naechste Seite liegt schon da).
        baseRightImg.src = target.seite_rechts;
        baseRightImg.alt = target.name + ' — rechte Seite';

        resetFlapInstant(flipRight, 'rotateY(0deg)');
        requestAnimationFrame(() => {
          flipRight.style.transform = 'rotateY(-180deg)';
        });

        flipRight.addEventListener('transitionend', function onDone() {
          flipRight.removeEventListener('transitionend', onDone);
          // Erst jetzt, wenn die Klappe die linke Seite komplett bedeckt hat,
          // wird die linke Basis-Seite gewechselt — der Tausch ist unsichtbar,
          // weil die Klappe optisch exakt an derselben Stelle liegt.
          baseLeftImg.src = target.seite_links;
          baseLeftImg.alt = target.name + ' — linke Seite';
          resetFlapInstant(flipRight, 'rotateY(0deg)');
          flipRight.style.zIndex = '';
          flipLeft.style.zIndex = '';
          currentIndex = targetIndex;
          renderBaseInstant(currentIndex);
          isAnimating = false;
        }, { once: true });

      } else {
        // Rueckwaerts: linke Seite klappt um und legt sich auf die rechte.
        flipLeft.style.zIndex = '10';
        flipRight.style.zIndex = '4';

        setImg('flipLeftFrontImg', current, 'links');
        setImg('flipLeftBackImg', target, 'rechts');

        baseLeftImg.src = target.seite_links;
        baseLeftImg.alt = target.name + ' — linke Seite';

        resetFlapInstant(flipLeft, 'rotateY(0deg)');
        requestAnimationFrame(() => {
          flipLeft.style.transform = 'rotateY(180deg)';
        });

        flipLeft.addEventListener('transitionend', function onDone() {
          flipLeft.removeEventListener('transitionend', onDone);
          baseRightImg.src = target.seite_rechts;
          baseRightImg.alt = target.name + ' — rechte Seite';
          resetFlapInstant(flipLeft, 'rotateY(0deg)');
          flipLeft.style.zIndex = '';
          flipRight.style.zIndex = '';
          currentIndex = targetIndex;
          renderBaseInstant(currentIndex);
          isAnimating = false;
        }, { once: true });
      }
    }

    prevBtn.addEventListener('click', () => turn(-1));
    nextBtn.addEventListener('click', () => turn(1));

    const pageJumpInput = document.getElementById('pageJumpInput');
    const pageJumpBtn = document.getElementById('pageJumpBtn');

    function jumpToPage(num) {
      if (isAnimating || isNaN(num)) return;
      const target = Math.min(Math.max(1, num), MAHMORIES_MITGLIEDER.length) - 1;
      currentIndex = target;
      renderBaseInstant(currentIndex);
      pageJumpInput.value = '';
    }

    pageJumpBtn.addEventListener('click', () => {
      jumpToPage(parseInt(pageJumpInput.value, 10));
    });
    pageJumpInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') jumpToPage(parseInt(pageJumpInput.value, 10));
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') turn(1);
      if (e.key === 'ArrowLeft') turn(-1);
    });

    renderBaseInstant(currentIndex);
  </script>
</body>
</html>
